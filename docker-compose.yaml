x-service-base: &service-base
  build:
    context: .
    args:
      SERVICE: ~
  #  restart: on-failure:5
  restart: unless-stopped
  networks:
    - backend
  env_file:
    - path: default.env
      required: true
#  depends_on:
#    kafka:
#      condition: service_started

services:
  user:
    <<: *service-base
    build:
      dockerfile: Dockerfile.go
      args:
        SERVICE: user
    #    deploy:
    #      mode: replicated
    #      replicas: 2
    #      endpoint_mode: dnsrr
  product:
    <<: *service-base
    build:
      dockerfile: Dockerfile.go
      args:
        SERVICE: product
  gateway:
    <<: *service-base
    build:
      dockerfile: Dockerfile.go
      args:
        SERVICE: gateway
    ports:
      - 8080:8080
    volumes:
      - dist:/root/dist:ro
    depends_on:
      - frontend
  frontend:
    <<: *service-base
    restart: on-failure
    build:
      dockerfile: Dockerfile.frontend
      args:
        SERVICE: frontend
    volumes:
      - dist:/app/dist
