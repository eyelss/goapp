#      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
#
#      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
#    networks:
#      - backend

networks:
  backend:
    driver: bridge

volumes:
  dist: